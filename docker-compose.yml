version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: impagats-db
    environment:
      POSTGRES_USER: impagats
      POSTGRES_PASSWORD: impagats
      POSTGRES_DB: impagats
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
